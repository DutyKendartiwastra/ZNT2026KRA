<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZNT Kab. Karanganyar</title>

    <!-- ArcGIS -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.24/esri/themes/light/main.css"/>

    <!-- Boxicons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        
        <!-- Kiri: Form Login (1/4) -->
        <div class="login-left">
            <div class="branding">
                <img src="https://raw.githubusercontent.com/DutyKendartiwastra/Belajar1/main/Foto/LogoBPN.png" alt="Logo BPN" class="logo">
                <h2 class="kantah">Kantor Pertanahan Kabupaten Karanganyar</h2>
            </div>

            <div class="login-form">
                <h1 class="judul">Expose Hasil Pembaruan Peta Zona Nilai Tanah</h1>
                <p class="desc">Silahkan masuk untuk memulai presentasi</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                    </div>

                    <button type="submit" class="btn-login">Masuk</button>
                </form>

                <div id="errorMessage" class="error-message"></div>
            </div>
        </div>

        <!-- Kanan: Foto Dokumentasi (3/4) -->
        <div class="login-right">
            <div class="illustration">
                <!-- Ganti dengan foto kegiatan kamu -->
                <img src="https://picsum.photos/id/1015/1600/900" alt="Kegiatan BPN" class="bg-image">
            </div>
        </div>
    </div>

    <!-- Script Login - Paling Bawah -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            errorMsg.style.display = "none";

            try {
                const response = await fetch('https://backendwebgis-production.up.railway.app/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    alert('Login berhasil! Redirect ke WebGIS...');
                    window.location.href = "index.html";   
                } else {
                    errorMsg.textContent = data.message || "Username atau password salah";
                    errorMsg.style.display = "block";
                }
            } catch (error) {
                console.error(error);
                errorMsg.textContent = "Tidak bisa terhubung ke server.";
                errorMsg.style.display = "block";
            }
        });
    });
    </script>

</body>
</html>
