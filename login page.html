<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZNT Kab. Karanganyar</title>

    <!-- ArcGIS -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.24/esri/themes/light/main.css"/>

    <!-- Boxicons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="start">
        <form id="loginForm">
            <h1>Login</h1>
            
            <div class="input-box">
                <input type="text" id="username" placeholder="Username" required>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1m6-7h4c2.76 0 5 2.24 5 5H5c0-2.76 2.24-5 5-5"/>
                </svg>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9h-5v-2.28c.59-.35 1-.99 1-1.72 0-1.1-.9-2-2-2s-2 .9-2 2a2 2 0 0 0 1 1.72V20H6z"/>
                </svg>
            </div>

            <button type="submit" class="btn">Masuk</button>
            
            <div id="errorMessage" class="error" style="color: red; margin-top: 10px; display: none;"></div>
        </form>
    </div>

    <div class="cover">
        <h2>Expose Hasil</h2>
        <h3>Pembaruan Peta Zona Nilai Tanah Tahun Anggaran 2026</h3>
    </div>

    <!-- Script Login -->
    <script src="webgis-backend/login.js"></script>
</body>
</html>
