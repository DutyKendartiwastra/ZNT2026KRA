        <!-- === PROTEKSI LOGIN (Paling Atas) === -->
        <script>
            async function checkAuth() {
                const token = localStorage.getItem('token');
                
                if (!token) {
                    alert("Anda belum login. Silakan login terlebih dahulu.");
                    window.location.href = "login page.html";
                    return;
                }

                try {
                    const response = await fetch('https://backendwebgis-production.up.railway.app/api/check-login', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    const data = await response.json();

                    if (!data.loggedIn) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        alert("Sesi login Anda telah berakhir. Silakan login kembali.");
                        window.location.href = "login page.html";
                    }
                } catch (error) {
                    console.error("Error cek login:", error);
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    alert("Sesi login tidak valid. Silakan login kembali.");
                    window.location.href = "login page.html";
                }
            }

            // Jalankan pengecekan saat halaman dimuat
            window.onload = checkAuth;
        </script>

        <script>
            function logout() {
            if (confirm('Yakin ingin logout?')) {
               localStorage.removeItem('token');
               localStorage.removeItem('user');
               alert('Anda telah logout.');
               window.location.href = "login page.html";  // atau halaman login kamu
            }
        }
        </script>
